global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'chat_serve'
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ['host.docker.internal:9090']
    # Se você usa docker em Linux e o servidor está no host, troque host.docker.internal pelo host real
    # Autenticação Bearer (substitua via envsubst):
    authorization:
      type: Bearer
      credentials: "secret123"

# Regras e alerting podem ser adicionados em separate rule_files
rule_files: []
